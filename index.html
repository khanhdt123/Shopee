<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Chuyển Link Shopee Affiliate</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shopee Aff">
    
    <link rel="icon" type="image/x-icon" href="https://shopee.vn/favicon.ico">
    <link rel="apple-touch-icon" href="https://shopee.vn/favicon.ico">

    <style>
        /* Reset CSS để ứng dụng tràn màn hình */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; 
            background-color: #ffffff;
            /* Ngăn chặn các hành vi kéo mặc định của trình duyệt di động */
            touch-action: none;
        }
        
        /* Wrapper để cắt bỏ phần banner của Google Apps Script */
        .app-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            /* Tăng chiều cao thêm 65px để đẩy banner "Ứng dụng do người dùng..." xuống dưới */
            height: calc(100% + 65px); 
            border: none;
            display: block;
            margin-top: 0;
            /* Giúp cuộn mượt mà bên trong iframe trên iOS */
            -webkit-overflow-scrolling: touch;
        }

        /* Màn hình chờ giả lập khi App đang load (tùy chọn) */
        #splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ee4d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        #splash img { width: 80px; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="https://shopee.vn/favicon.ico" alt="Loading...">
    </div>

    <div class="app-wrapper">
        <iframe 
            id="app-frame"
            src="https://script.google.com/macros/s/AKfycbyLF-jpPvXmvIDR4W8PHFo3_htvK3--jOUBGeZWJJJSsX-z-Jrh7QoN6uI847f17Z0a/exec"
            onload="hideSplash()"
        ></iframe>
    </div>

    <script>
        // Hàm ẩn màn hình chào sau khi iframe đã tải xong
        function hideSplash() {
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
            }, 500);
        }

        // Tự động ẩn splash sau 3 giây nếu mạng chậm
        setTimeout(hideSplash, 3000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Công cụ chuyển link Shopee Khuyến Mãi</title>
    
    <link rel="icon" type="image/x-icon" href="https://shopee.vn/favicon.ico">

    <style>
        /* Đảm bảo không có khoảng trắng thừa và không cho cuộn trang chính */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; 
            background-color: #ffffff;
        }
        
        /* Thủ thuật ẩn banner: Đẩy iframe lún xuống dưới và che phần chân trang */
        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            /* Tăng thêm chiều cao để đẩy banner Google ra khỏi tầm mắt */
            height: calc(100% + 65px); 
            border: none;
            display: block;
            /* Khử khoảng cách phía trên nếu có */
            margin-top: 0; 
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <iframe src="https://script.google.com/macros/s/AKfycbyLF-jpPvXmvIDR4W8PHFo3_htvK3--jOUBGeZWJJJSsX-z-Jrh7QoN6uI847f17Z0a/exec"></iframe>
    </div>
</body>
</html>

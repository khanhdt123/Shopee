<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Chuyển Link Shopee Khuyến Mãi</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ee4d2d">
    
    <meta name="apple-mobile-web-app-title" content="Shopee Link KM">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1xeq5vqFcxndkTyC_k4dSBrXQ0Cmb0BXP">
    <link rel="icon" href="https://shopee.vn/favicon.ico">

    <style>
        /* Thiết lập nền tảng cho App */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #ee4d2d; /* Màu cam Shopee */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Lớp bọc để cắt bỏ banner "Ứng dụng do người dùng Google tạo" */
        .app-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
        }

        iframe {
            width: 100%;
            /* Tăng chiều cao thêm 65px để đẩy phần banner chân trang xuống dưới tầm mắt */
            height: calc(100% + 65px); 
            border: none;
            display: block;
            margin-top: 0;
            -webkit-overflow-scrolling: touch; /* Giúp cuộn mượt trên iOS */
        }
        
        /* Màn hình chào (Splash Screen) chuyên nghiệp */
        #splash { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #ee4d2d; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 999; 
            transition: opacity 0.5s ease-out; 
        }
        #splash img { 
            width: 100px; 
            animation: pulse 1.5s infinite; 
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="splash">
        <img src="https://lh3.googleusercontent.com/d/1csoDKIXdXyWLYeUrTeucwRbb_YLJxqux" alt="Shopee Logo">
    </div>

    <div class="app-container">
        <iframe 
            id="shopee-app"
            src="https://script.google.com/macros/s/AKfycbyLF-jpPvXmvIDR4W8PHFo3_htvK3--jOUBGeZWJJJSsX-z-Jrh7QoN6uI847f17Z0a/exec" 
            onload="hideSplash()">
        </iframe>
    </div>

    <script>
        function hideSplash() {
            const splash = document.getElementById('splash');
            if (splash) {
                splash.style.opacity = '0';
                setTimeout(() => { splash.style.display = 'none'; }, 500);
            }
        }

        setTimeout(hideSplash, 4000);

        // Logic nhắc nhở cài đặt tối ưu cho iPhone
        window.addEventListener('load', function() {
            const isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
            const isStandalone = window.navigator.standalone === true;

            if (isIos && !isStandalone) {
                setTimeout(() => {
                    alert("📢 Mẹo dùng như App:\n1. Nhấn nút 'Chia sẻ' (hình vuông mũi tên lên)\n2. Chọn 'Thêm vào MH chính'\nĐể truy cập nhanh từ màn hình điện thoại nhé!");
                }, 3000);
            }
        });
    </script>

</body>
</html>

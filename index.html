<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopee Affiliate Converter</title>
    <style>
        /* Đảm bảo không có khoảng trắng thừa và không cho cuộn trang chính */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            font-family: sans-serif;
            overflow: hidden; 
            background-color: #f5f5f5;
        }
        
        /* Thủ thuật ẩn banner: Đẩy iframe lún xuống dưới và che phần chân trang */
        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            /* Tăng chiều cao lên 100px để đẩy banner Google ra khỏi vùng nhìn thấy */
            height: calc(100% + 60px); 
            border: none;
            /* Dịch chuyển ngược lên trên để bù lại phần chân bị ẩn */
            margin-top: 0; 
            display: block;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <iframe src="https://script.google.com/macros/s/AKfycbyLF-jpPvXmvIDR4W8PHFo3_htvK3--jOUBGeZWJJJSsX-z-Jrh7QoN6uI847f17Z0a/exec"></iframe>
    </div>
</body>
</html>
